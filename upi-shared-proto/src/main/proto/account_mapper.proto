// Usamos la versión moderna de Protobuf
syntax = "proto3";

// Le decimos al generador cómo crear los paquetes de Java
option java_multiple_files = true;
option java_package = "com.upi.bank.grpc.accountmapper";

// 1. El Servicio (Equivalente a una Interfaz en Java o un Controller en REST)
service AccountMapperGrpcService {
  // Definimos un método (rpc) que recibe un Request y devuelve un Response
  rpc MapAccount (AccountResolveRequest) returns (AccountResolveResponse);
}

// 2. El mensaje de entrada (Input DTO)
message AccountResolveRequest {
  // El número '1' no es el valor, es la "etiqueta binaria" para compresión ultrarrápida
  string vpa = 1;
}

// 3. El mensaje de salida (Output DTO)
message AccountResolveResponse {
  string account_number = 1;
  string status = 2;
}