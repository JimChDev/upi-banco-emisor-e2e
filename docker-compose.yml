version: '3.8'

services:
  # 1. EL LIBRO MAYOR (PostgreSQL para los Bancos)
  postgres-db:
    image: postgres:15-alpine
    container_name: upi-postgres
    environment:
      POSTGRES_USER: upi_admin
      POSTGRES_PASSWORD: upi_password
      POSTGRES_DB: upi_ledger
    ports:
      #Lado izquierdo maquina local, lado derecho contenedor
      - "5432:5432" # Exponemos el puerto para conectar DBeaver o IntelliJ DataGrip
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistencia: Si borras el contenedor, no pierdes el dinero
    restart: unless-stopped

  # 2. EL ENRUTADOR O(1) (Redis para el Account Mapper y Antifraude)
  redis-cache:
    image: redis:7-alpine
    container_name: upi-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. EL COORDINADOR DE EVENTOS (Zookeeper es el jefe de Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: upi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  # 4. EL BUS DE MENSAJES (Kafka para el Patrón Saga y Notificaciones asíncronas)
  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: upi-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Configuración para que tu máquina local pueda hablar con Kafka
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

# Declaramos el volumen externo para que la base de datos sea persistente
volumes:
  postgres_data: